services:
  - type: web
    name: reservation-app
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
      - key: LOCAL_NETWORK_ONLY
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DB_HOST
        value: reservation-mysql
      - key: DB_PORT
        value: 3306
      - key: DB_NAME
        value: reservation_system
      - key: DB_USER
        value: reservation_app
      - key: DB_PASSWORD
        sync: false

  - type: pserv
    name: reservation-mysql
    runtime: docker
    plan: starter
    region: singapore
    repo: https://github.com/render-examples/mysql.git
    branch: master
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 10
    envVars:
      - key: MYSQL_DATABASE
        value: reservation_system
      - key: MYSQL_USER
        value: reservation_app
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_ROOT_PASSWORD
        sync: false
