services:
  - type: web
    name: reservation-app
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
      - key: LOCAL_NETWORK_ONLY
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DB_HOST
        fromService:
          type: pserv
          name: reservation-mysql
          property: host
      - key: DB_PORT
        fromService:
          type: pserv
          name: reservation-mysql
          property: port
      - key: DB_NAME
        fromService:
          type: pserv
          name: reservation-mysql
          envVarKey: MYSQL_DATABASE
      - key: DB_USER
        fromService:
          type: pserv
          name: reservation-mysql
          envVarKey: MYSQL_USER
      - key: DB_PASSWORD
        fromService:
          type: pserv
          name: reservation-mysql
          envVarKey: MYSQL_PASSWORD

  - type: pserv
    name: reservation-mysql
    runtime: image
    plan: starter
    region: singapore
    image:
      url: docker.io/mysql:8.0
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 10
    envVars:
      - key: MYSQL_DATABASE
        value: reservation_system
      - key: MYSQL_USER
        value: reservation_app
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_ROOT_PASSWORD
        sync: false
